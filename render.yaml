# Render Blueprint — https://render.com/docs/blueprint-spec
# Set DATABASE_URL, JWT_SECRET, CORS_ORIGINS, and FRONTEND_ORIGIN in the dashboard.
services:
  - type: web
    name: orbitnote-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
